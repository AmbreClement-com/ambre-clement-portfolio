# Sauvegardes automatiques — possédées par le client (aucun service tiers payant).
#
#  • Tous les jours 04h10 UTC : pg_dump de la base → chiffré (AES-256) → bucket
#    R2 de sauvegarde. Rétention gérée par une règle de cycle de vie R2 (30 j),
#    à configurer une fois dans le dashboard Cloudflare du bucket.
#  • Tous les dimanches : synchronisation du bucket MEDIA vers le bucket de
#    sauvegarde (copie incrémentale rclone — ne retélécharge pas l'existant).
#
# Secrets à créer dans GitHub → Settings → Secrets and variables → Actions :
#   BACKUP_DATABASE_URL   URL Postgres (celle de prod, role lecture suffisant)
#   BACKUP_PASSPHRASE     phrase de chiffrement des dumps (gestionnaire de mdp !)
#   BACKUP_S3_ENDPOINT    ex. https://<account_id>.r2.cloudflarestorage.com
#   BACKUP_S3_ACCESS_KEY_ID / BACKUP_S3_SECRET_ACCESS_KEY  (clé scoppée backup)
#   BACKUP_S3_BUCKET      nom du bucket de SAUVEGARDE (≠ bucket media)
#   MEDIA_S3_BUCKET       nom du bucket MEDIA (pour la synchro hebdo)
#
# Restauration (documentée dans docs/MIGRATION.md §Sauvegardes) :
#   openssl enc -d -aes-256-cbc -pbkdf2 -in dump.sql.gz.enc -pass pass:<PHRASE> | gunzip | psql <URL>

name: backups

on:
  schedule:
    - cron: "10 4 * * *" # dump quotidien
    - cron: "40 4 * * 0" # synchro media hebdomadaire (dimanche)
  workflow_dispatch: {} # lancement manuel possible (onglet Actions)

jobs:
  dump-db:
    runs-on: ubuntu-latest
    # tourne pour le cron quotidien ET le lancement manuel
    if: github.event.schedule != '40 4 * * 0'
    steps:
      - name: Dump + chiffrement + envoi vers R2
        env:
          DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
        run: |
          set -euo pipefail
          sudo apt-get -qq update && sudo apt-get -qq install -y postgresql-client
          STAMP=$(date -u +%Y-%m-%d_%H%M)
          pg_dump --no-owner --no-privileges "$DATABASE_URL" \
            | gzip \
            | openssl enc -aes-256-cbc -pbkdf2 -pass env:PASSPHRASE \
            > "db_${STAMP}.sql.gz.enc"
          aws s3 cp "db_${STAMP}.sql.gz.enc" "s3://${S3_BUCKET}/db/db_${STAMP}.sql.gz.enc" \
            --endpoint-url "$S3_ENDPOINT"
          echo "✓ dump db_${STAMP}.sql.gz.enc envoyé"

  sync-media:
    runs-on: ubuntu-latest
    if: github.event.schedule == '40 4 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Synchro bucket media → bucket sauvegarde (rclone)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
          MEDIA_BUCKET: ${{ secrets.MEDIA_S3_BUCKET }}
          BACKUP_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
        run: |
          set -euo pipefail
          curl -fsSL https://rclone.org/install.sh | sudo bash >/dev/null
          rclone sync ":s3,endpoint=${S3_ENDPOINT},access_key_id=${AWS_ACCESS_KEY_ID},secret_access_key=${AWS_SECRET_ACCESS_KEY}:${MEDIA_BUCKET}" \
                      ":s3,endpoint=${S3_ENDPOINT},access_key_id=${AWS_ACCESS_KEY_ID},secret_access_key=${AWS_SECRET_ACCESS_KEY}:${BACKUP_BUCKET}/media" \
                      --fast-list --transfers 8 --checksum
          echo "✓ media synchronisé"
